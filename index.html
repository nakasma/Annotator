            if (!currentModalDataUrl) return;
            const link = document.createElement('a');
            link.download = 'annotated-image.png';
            link.href = currentModalDataUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            closeCopyModal();
            showToast('画像を保存しました', false);
        }

        async function copyToClipboard() {
            const btn = document.getElementById('copy-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 生成中...';
            
            canvas.discardActiveObject();
            
            const activeGuide = canvas.getObjects().find(o => o.id === 'crop-rect');
            if (activeGuide) activeGuide.visible = false;
            
            const originalZoom = canvas.getZoom();
            const originalWidth = canvas.getWidth();
            const originalHeight = canvas.getHeight();
            const originalVpt = canvas.viewportTransform.slice();

            canvas.setZoom(1);
            canvas.setWidth(BASE_WIDTH);
            canvas.setHeight(BASE_HEIGHT);
            canvas.viewportTransform = [1, 0, 0, 1, 0, 0];
            
            canvas.calcOffset();
            canvas.getObjects().forEach(obj => obj.setCoords());

            canvas.requestRenderAll();
            canvas.renderAll(); 

            let cropInfo;
            if (currentCropMode === 'fit') {
                cropInfo = getContentRect();
            } else if (activeGuide) {
                cropInfo = {
                    left: activeGuide.left,
                    top: activeGuide.top,
                    width: activeGuide.width * activeGuide.scaleX,
                    height: activeGuide.height * activeGuide.scaleY
                };
            } else {
                cropInfo = { left: 0, top: 0, width: BASE_WIDTH, height: BASE_HEIGHT };
            }

            const dataUrl = canvas.toDataURL({ 
                format: 'png', 
                multiplier: 1,
                left: cropInfo.left,
                top: cropInfo.top,
                width: cropInfo.width,
                height: cropInfo.height
            });

            canvas.setZoom(originalZoom);
            canvas.setWidth(originalWidth);
            canvas.setHeight(originalHeight);
            canvas.viewportTransform = originalVpt;
            
            if (activeGuide && currentCropMode !== 'fit') activeGuide.visible = true;
            
            canvas.requestRenderAll();
            btn.innerHTML = originalText;

            try {
                // dataURLをBlobに変換してクリップボードAPIで直接コピーを試行
                const response = await fetch(dataUrl);
                const blob = await response.blob();
                const item = new ClipboardItem({ 'image/png': blob });
                await navigator.clipboard.write([item]);
                
                showToast('クリップボードに画像をコピーしました');
            } catch (error) {
                console.warn('クリップボードへの直接コピーに失敗しました（iframeの制限等のため）。フォールバックを使用します。', error);
                // 失敗した場合は元のモーダル(右クリック保存)を表示
                showCopyModal(dataUrl);
            }
        }

        function downloadImage() {
            canvas.discardActiveObject();
            
            const activeGuide = canvas.getObjects().find(o => o.id === 'crop-rect');
            if (activeGuide) activeGuide.visible = false;

            const originalZoom = canvas.getZoom();
            const originalWidth = canvas.getWidth();
            const originalHeight = canvas.getHeight();
            const originalVpt = canvas.viewportTransform.slice();

            canvas.setZoom(1);
            canvas.setWidth(BASE_WIDTH);
            canvas.setHeight(BASE_HEIGHT);
            canvas.viewportTransform = [1, 0, 0, 1, 0, 0];
            
            canvas.calcOffset();
            canvas.getObjects().forEach(obj => obj.setCoords());

            canvas.renderAll();

            let cropInfo;
            if (currentCropMode === 'fit') {
                cropInfo = getContentRect();
            } else if (activeGuide) {
                cropInfo = {
                    left: activeGuide.left,
                    top: activeGuide.top,
                    width: activeGuide.width * activeGuide.scaleX,
                    height: activeGuide.height * activeGuide.scaleY
                };
            } else {
                cropInfo = { left: 0, top: 0, width: BASE_WIDTH, height: BASE_HEIGHT };
            }

            const link = document.createElement('a');
            link.download = 'annotated-image.png';
            link.href = canvas.toDataURL({ 
                format: 'png', 
                multiplier: 1,
                left: cropInfo.left,
                top: cropInfo.top,
                width: cropInfo.width,
                height: cropInfo.height
            });
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            canvas.setZoom(originalZoom);
            canvas.setWidth(originalWidth);
            canvas.setHeight(originalHeight);
            canvas.viewportTransform = originalVpt;

            if (activeGuide && currentCropMode !== 'fit') activeGuide.visible = true;
            
            canvas.requestRenderAll();
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            const icon = toast.querySelector('i');
            if(isError) {
                icon.className = 'fa-solid fa-circle-exclamation text-red-400';
            } else {
                icon.className = 'fa-solid fa-check-circle text-green-400';
            }

            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }
    </script>
